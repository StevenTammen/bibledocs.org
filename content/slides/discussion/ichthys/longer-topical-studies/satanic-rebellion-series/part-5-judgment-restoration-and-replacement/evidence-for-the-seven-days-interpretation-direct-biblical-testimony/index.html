## Evidence for the \"seven days\" interpretation: Direct biblical testimony (src: Ichthys)

### Summary

---






<div class="special-content quote">
<strong>
<a href="/site/content-features/#quotes">Quote</a> from <a href="https://ichthys.com/Satans-Rebellion-Part5.htm">Ichthys</a>
</strong>

<p>The interpretation of human history as a set of seven millennia has a certain internal logic when we remember that history in the aggregate has been designed by God for the very specific purposes outlined in this series of judging evil, restoring righteousness, and replacing evil-doers with faithful followers, all through the agency and saving work of His Son:</p>

<div class="special-content scripture">
<strong>Hebrews 11:3a | <a href="/site/content-features/#ichthys-translations">Ichthys translation</a></strong>

<p>By faith we understand that the ages have been constructed by the Word of God.</p>

</div>




</div>
---
<div class="special-content quote">






<p>There are clear indications in scripture that God's specific plan of construction for that part of time we call human history is indeed a series of seven millennia.  For example, when scripture makes a deliberate point of telling us that Jesus took his inner group of disciples up to the Mount of Transfiguration “after six days” (Matt.17:1; Mk.9:2; cf. Ex.24:16-18), it is reasonable to suppose that this information has not been supplied to no particular purpose, yet nothing in the context of either Matthew or Mark explains why here almost uniquely in the gospels such specific chronological information should be given – unless it is precisely because of the fact that on <strong><em>the seventh day</em></strong> our Lord was “transfigured”, a preview of His return in glory at the second advent (as the appearance of the two heralds of that event, Moses and Elijah, makes clear).  And if the seventh day is thus symbolically linked here to the second advent (as it clearly is), we would be remiss not at least to consider the possibility that this otherwise inexplicable reference to the “six days” which precede this symbolic second advent and Millennium are meant to be understood in a similar way, namely as representing the six millennia of human history which precede the second advent and the Millennium.</p>



</div>
---
<div class="special-content quote">






<p>We may therefore start with this fact, namely that the Millennium, the final period of human history, the only period of human history specifically named and delineated in scripture, is most definitely described as a period of one thousand literal years (Rev.20:1-7). Elsewhere in scripture, the Millennium, the time of the reign of Christ commencing with His triumphant return and concomitant judgment upon His enemies, is called "the <strong><em>day</em></strong> of the Lord" (Is.2:11-21; 10:11-34; Joel 2:28-32; Am.5:18-20; Ob.1:15; Zeph.1:14; Zech.14:1-7; Mal.4:5; 1Thes.5:2-4; 2Thes.2:2; 2Pet.3:10; Rev.6:17; 16:14), and "the <strong><em>year</em></strong> of the Lord" (Is.61:2; 63:4; cf. Is.49:8; Lk.4:19; 2Cor.6:1-2). In the case of the Millennium, therefore, the Bible clearly calls a literal and specific period of 1000 years "a day". While from the human perspective the difference between a day and a millennium is massive, to God, the Creator and Master of time who exists outside of time and is in no way subject to it, these two finite chronological periods are much the same:</p>



</div>
---
<div class="special-content quote">






<div class="special-content scripture">
<strong>Psalm 90:4 | NASB</strong>

<p>For a thousand years in Thy sight are like yesterday when it passes by, or as a watch in the night.</p>

</div>


<div class="special-content scripture">
<strong>2nd Peter 3:8 | <a href="/site/content-features/#ichthys-translations">Ichthys translation</a></strong>

<p>Let not this one fact escape your attention then, beloved, namely that one day is like a thousand years in the Lord's eyes, and a thousand years like one day.</p>

</div>


<div class="special-content scripture">
<strong>Hosea 6:2 | <a href="/site/content-features/#ichthys-translations">Ichthys translation</a></strong>

<p>[The Lord] will restore us, [Israel], after two days (i.e., after the Church age), and will raise us up on the third day (i.e., the Millennium), that we may live in His presence (i.e., with the Messiah, who personifies this prophecy in His resurrection on the third day).</p>

</div>




</div>
---
<div class="special-content quote">






<p>By using short periods (hours, days, weeks) to designate much longer chronological periods, scripture reflects God's complete sovereignty over time. This tendency of scripture to diminish the significance of a given period of time in proportion to the importance of time's Inventor and Master is common in the Bible and is often accomplished in this same way, namely through the use of relatively small units to refer to much longer chronological spans. For example, the "year of redemption" in Isaiah 63:4, and the "day of vengeance" in both Isaiah 34:8 and 63:4 refer to the thousand years of the Millennium, while the "day of salvation" in Isaiah 49:8 refers to the two thousand years of the Church in addition to the Millennium (cf. 2Cor.6:1-2). In the "seventy sevens" prophecy of Daniel chapter nine, each day of the "week" is a one year period (Dan.9:25-27). Similarly, at Revelation 12:14 the "time, times and half a time" refers to the three and one half years of the Great Tribulation (as in Dan.4:16 the seven "times" are seven years). The effect of all these passages is to make it clear to God's elect that even though time plays such a seemingly dominant role in our lives, it is nothing at all to God and presents not the slightest obstacle to the accomplishment of His will. It is merely a tool He has invented for the ordering of our lives wherein we may choose for Him (time is merely the stuff of choice: Eph.5:16; Col.4:5). Therefore seven thousand years, the sum total of human history, may seem a long span to us from our earthly perspective, but in terms of the eternity that God has constructed for us His faithful followers, it is an inexpressibly minute period of time.</p>



</div>
---
<div class="special-content quote">






<p>As we shall see below, the chronological records found in the Bible yield approximately 2000 years from Christ to Abraham and an additional 2000 years from Abraham to Adam. Given that the Gentile and Jewish ages both covered ca. 2000 years, and that the Millennium, the final "day" in God's plan for human history, will be 1000 years, it requires no great leap of exegetical skill to posit a comparable 2000 years for the Church age. In so doing, a total of 7000 years results wherein each millennium is reckoned as "a day" in God's system. The analogy to the seven day week, another divine invention (cf. Gen.1:3ff.), is also impossible to ignore, especially considering the very close analogy between the seventh day of rest, the Sabbath, and the seventh day of human history, the Millennium, with all its promised peace and abundance, which likewise comes as the final "day" of the seven (cf. Is.9:6-7; see <a href="https://ichthys.com/SR1copy.htm#f)%20The%20Millennial%20Jerusalem">Part I of this series, section II.6.f.</a>). Based on the analogy of the week, therefore, the Millennium of its own accord invites us to posit six prior thousand year "days". This evidence is all the stronger when we consider that the original period of time wherein God began the process of restoration and replacement known as human history was the original week of seven days, also ending in a day of rest (compare the "six days" mentioned prior to the transfiguration which prefigures the Second Advent in Matt.17:1 and the beginning of the "seventh day" or Millennium).</p>

</div>




---




### Summary points

When Jesus was transfigured on the Mount of Transfiguration on the seventh day, it is a preview of His return in glory at the second advent. How do we know?

- Moses and Elijah being present clearly align with the two witnesses of the end times.
- There is also the simple matter that what else would the transfiguration be a preview of if not Jesus's eventual return in glory? 

Jesus return at the second advent ushers in the Millennium (a literal 1,000 year period), and if we just said that the transfiguration happened on the seventh day, then equating the seventh day with the Millennium follows naturally.

- The text explicitly saying "after six days" (i.e., giving such specific chronological information) is a bit odd unless we are supposed to make something of it... like, maybe the preceding six days also each map onto a millennium, just like this seventh day?



---




### Summary points

So we start with the unambiguous teachings concerning the Millennium, and build out the wider doctrine of the seven millennial days from there. That is the interpretive "order" to things.

- The Millennium is the only period of human history specifically named and delineated in scripture.
- It is most definitely described as a period of one thousand literal years (Rev.20:1-7).
- The Millennium begins with triumphant return of the our Lord, and his judgment upon His enemies.
- In scripture, the Millennial reign of Christ (inclusive of His return, judgment of His enemies, and rule thereafter) is called "the ***day*** of the Lord" and "the ***year*** of the Lord".
- So at least for the Millennium, we have direct textual evidence that a 1,000 year period is called a "day".



---




### Summary points

Other examples of the Bible using relatively small units to refer to much longer chronological spans:

- The "year of redemption" in Isaiah 63:4, and the "day of vengeance" in both Isaiah 34:8 and 63:4 refer to the thousand years of the Millennium.
- The "day of salvation" in Isaiah 49:8 refers to the two thousand years of the Church in addition to the Millennium (cf. 2Cor.6:1-2)
- In the "seventy sevens" prophecy of Daniel chapter nine, each day of the "week" is a one year period (Dan.9:25-27).
- Similarly, at Revelation 12:14 the "time, times and half a time" refers to the three and one half years of the Great Tribulation (as in Dan.4:16 the seven "times" are seven years).

By using short periods (hours, days, weeks) to designate much longer chronological periods, scripture reflects God's complete sovereignty over time.



---




### Summary points

Taken together, all the evidence we've started with here leads us to ask a question: is it possible that human history is composed of seven 1,000 year "days", with the last day being the Millennial reign of Christ?

In fact, we need not stop there. Additional evidence also all likewise points us to this same exact conclusion:

1. The chronological records found in the Bible yield approximately 2,000 years from Christ to Abraham and an additional 2,000 years from Abraham to Adam. Given that the Gentile and Jewish ages both covered ca. 2,000 years, and that the Millennium, the final "day" in God's plan for human history, will be 1000 years, it requires no great leap of exegetical skill to posit a comparable 2,000 years for the Church age.
2. The analogy to the seven day week, (another divine invention) is also impossible to ignore, especially considering the very close analogy between the seventh day of rest, the Sabbath, and the seventh day of human history, the Millennium.
3. This point is all the stronger when you consider that the first week is exactly where this structure came from: the initial seven-day week of re-creation (as recounted in Genesis 1) also ended in a seventh day of rest.



---




### Follow-on topics

When discussing the seven millennial days of human history, I think it is important for us to emphasize that if you accept the parallel between the Millennium and a seventh day of rest (preceded by six prior days), everything else flow very naturally from that. We are really talking about one interpretive assumption here, one single hurdle to clear. And then the rest is just responsibly fleshing out the specifics.

Does the Bible ever explicitly say "the Millennium is the seventh day in a week of seven days?" No, it does not. But it is not like we only accept evidence stated directly in scripture. For example, one of the arguments we commonly use to prove Jesus's divinity is also somewhat indirect:

- When Jesus said "before Abraham was, I AM" (John 8:58) He is clearly claiming to be God, but it is not stated in so many words. Instead you have to "read between the lines" a bit. This is Jesus equating Himself with the the tetragrammaton—the Holy name of God mentioned in Exodus 3:15. But the text doesn't actually say that directly. You just have to see that this is so.



---




### Follow-on topics

I think that because there has historically been so much false teaching about end times chronology, people are prone to throwing out the baby with the bathwater here. And this is why I think from an apologetics perspective, it makes sense to focus on the fact that we are talking about one and only one interpretive call here. There is not some complicated system of inferences and fanciful calculations to arrive at the general doctrine. Instead, it really is nothing more than "Wow, the Millennium sounds an awful lot like the seventh day of rest, so I wonder if that means that there are also six 1,000 year periods before it?" That's it.

Getting bogged down in the specifics that come after that (of which there are many, to be clear—given that chronology is always complex, and we have to deal with a lot of heavy prophecy stuff as part of drilling into the finer-grained details) is not needed in order to accept the wider pattern, which is what I think is the truly important thing.

So if people balk at 2026 as a specific date (which relies on certain additional assumptions that come up as you drill into the details, such as whether or not the seven years of the Tribulation are shared between Israel and the Church), as I see things, we don't need to push on that. We can instead fall back on the very intuitive argument that we've gone over here, and leave things at "human history will be ballpark 7,000 years, with the last 1,000 being a period of rest, just like the seventh day of the week". This still communicates the fact that God has a definite timetable for human history, that human history is planned down to the finest details by God. It also encourages people to take things seriously in terms of urgency/imminency, because no matter what, the math says we are nowadays getting close to 6,000 years of human history.
