<div class="special-content quote">
<strong>
<a href="/site/content-features/#quotes">Quote</a> from <a href="https://ichthys.com/Satans-Rebellion-Part5.htm">Ichthys</a>
</strong>

<p>The second two Genesis days of re-creation are clearly paired in that they alone witness acts of both <u>separation</u> <strong><em>and</em></strong> <u>filling</u>: dry ground separated from water <em>and</em> the filling of the earth with vegetation (Day 3); the sun, moon and stars filling the heavens <em>and</em> separating the light from the darkness (Day 4). Note that separation precedes filling on day three, while filling precedes separation on day four, evidencing the progression (from separation to filling) that we are observing here. The second pair of days provides more essential groundwork for physical life through the provision of dry land and the specific division of time. This second pair of days <em>also</em> provides the first two installments of re-filling the empty world through the creation of vegetation and heavenly bodies. This physical provisioning on the one hand and filling up of the empty world on the other is respectively analogous to the further building up of essential spiritual groundwork on the one hand, and, on the other, to the enlistment of believers provided by the second two millennial days of the Jewish age.</p>



</div>
---
<div class="special-content quote">






<u>Day #3 – Jewish age millennium #1</u>: 
<p>Just as the separating of dry land on day three of re-creation was necessary for human life, so the separation to God of a holy <strong><em>people</em></strong> during the third millennial day was essential for establishing an environment in which truth and spiritual growth could flourish. And just as the creation of vegetation on that third Genesis day was the first installment in the re-filling of the empty world, so the calling out of the seed of Abraham provides the first substantial and contiguous echelon of believers in the process of replacing the devil and his followers with a people after God's own heart, with the faith of Abraham, the "father of many nations" providing the pattern of salvation for all who would later believe (Rom.4:17; Gal.3:7-9).</p>



</div>
---
<div class="special-content quote">






<u>Day #4 – Jewish age millennium #2</u>: 
<p>Just as the separation of light from darkness into distinct and regular phases on the fourth Genesis day was necessary to provide a regular flow and sequence for time (required by human life), so the separation to God of a holy <strong><em>nation</em></strong> during the fourth millennial day was essential for stabilizing the environment in which truth and spiritual growth could flourish and then be witnessed to the nations. And just as the heavens were filled with the celestial <em>lights</em> on the fourth Genesis day, so the establishment of Israel, a holy nation to be a <em>light</em> to all the nations, was an essential step in the expansion of the family of God (Is.42:6; 43:21; 49:6; Acts 13:47).</p>



</div>
---
<div class="special-content quote">






<u>Separation</u>: 
<p>The calling out by God of a specific family and its development into a unique, witnessing nation necessitated its separation, its sanctification from all that was profane in the pagan world in which it existed. The mark of God's promise to Abraham of a holy progeny, namely circumcision, served to distinguish Israel as unique in God's eyes, and was also, importantly, a symbolic testimony of belief in God and His promises (Rom.2:29). The Mosaic Law was also a means of separation, sanctification and demarcation, for it called on Israel to "be holy as I am holy" (Lev.11:44-45; 1Pet.1:16), and an essential underlying principle in all of its precepts was to separate the holy from the profane (Lev.10:10; 20:25-26). The Ten Commandments, the essence of the Law (cf. Deut.4:13), speak to this same basic idea of separating the people of God from anything evil, sanctifying our conduct in life's most important areas:</p>



</div>
---
<div class="special-content quote">






<p>Area #1: Holiness toward God (sanctifying and separating Him in what we think, do and say):</p>

<p>1. <u>No other gods</u>: guarding the sanctity of how we <em>think</em> about Him.</p>

<p>2. <u>No idols</u>: guarding the sanctity of how we <em>act</em> toward Him.</p>

<p>3. <u>No misuse of His name</u>: guarding the sanctity of how we <em>represent</em> Him in our <em>speech</em>.</p>



</div>
---
<div class="special-content quote">






<p>Area #2: Holiness toward Life (sanctifying and separating ourselves from reliance on the world):</p>

<p>4. <u>Keep the Sabbath</u>: guarding the sanctity of the day of rest; trusting God, not ourselves, for provision in this life  (cf. Ezek.20:12; 20:20).  <strong>n.b.</strong>: this is the only commandment not repeated in the New Testament. As the book of Hebrews emphatically assures us, specific day observance has been replaced with the reality of continual rest in and reliance on God (in the same way that animal sacrifice has been replaced by the reality of Christ's sacrifice: Heb.4:1-11; cf. Rom.14:5-8; Col.2:16-17). Since the cross, we are to rest in God at all times, not just on one particular day.</p>



</div>
---
<div class="special-content quote">






<p>Area #3: Holiness toward Authority (sanctifying and separating ourselves from rebellion against divinely constituted authority):</p>

<p>5. <u>Honoring Father and Mother</u>: guarding the sanctity of our behavior toward legitimate authority, all those who under the charge of God function as stewards in His place towards us (parents being the first and prime example).</p>



</div>
---
<div class="special-content quote">






<p>Area #4: Holiness toward Others (sanctifying and separating ourselves from infringement upon the right of others to use this life to seek God):</p>

<p>6. <u>No Murder</u>: guarding the sanctity of life, the sine qua non for every human being to seek after God in the time God has given.</p>

<p>7. <u>No Adultery</u>: guarding the sanctity of the family, the basic support network required by the vast majority of people for normal function in life as a base for seeking God.</p>

<p>8. <u>No Theft</u>: guarding the sanctity of property, a necessary element for survival in the world that one may seek after God.</p>

<p>9. <u>No False Witness</u>: guarding the sanctity of freedom of the innocent before the law, an important requirement for being able to freely seek God.</p>

<p>10. <u>No Covetousness</u>: guarding the sanctity of freedom of action in general from threats of evil action and intent which impede, hinder and prevent the search for God.</p>



</div>
---
<div class="special-content quote">






<p>Finally, the firm establishment of the nation Israel with the ascension of David, a clear type of Jesus Christ (Ps.110), provided the dark world with a shining example of the righteousness and accompanying blessings from God upon a nation that followed Him and His perfect divine standards, standards (expressed in the Law, the Old Testament and the sanctified nation) which regulated an environment for seeking God and witnessing to Him in the midst of a dark world in a way analogous to the regulating function of the heavenly bodies that produce the sequence of light necessary for human existence (cf. Ex.19:5-6; Lev.20:26):</p>

<div class="special-content scripture">

<p>For you are a people holy to the Lord your God. The Lord your God has chosen you to be a people who are His special property, separated from all the peoples who are on the face of the earth.</p>

</div>


<div class="special-content scripture">
<strong>Isaiah 49:6 | <a href="/site/content-features/#ichthys-translations">Ichthys translation</a></strong>

<p>And He said, "It is too small a thing for you to be My servant, to establish the tribes of Jacob and to restore the sanctified ones of Israel. Therefore I have appointed you as a light for the nations, to be My [instrument of] salvation to the ends of the earth.</p>

</div>




</div>
---
<div class="special-content quote">






<u>Filling</u>: 
<p>With God's promise of progeny to Abraham and the birth of Isaac, the process of expansion of the family of God began in earnest, and the line of faith from Adam to Seth, a linear witness with little numerical expansion in the world (as the small remaining remnant of Noah and his seven family members at the time of the flood demonstrates: 1Pet.3:20), now develops into a significant expansion in breadth as Israel the vine begins to flourish under the now more favorable circumstances and to spread out in the world in a manner analogous to the filling of the earth with vegetation on the third Genesis day (Ps.80:8-16; Is.5:1-2; Jer.2:21; Ezek.17; Hos.10:1; cf. Jn.15:1). The pledge of circumcision (the mark of a people apart) and the giving of the Law (the perfect separation of right and wrong) served as prime elements of this sanctification. The formation (from this expanded family) of a holy nation was also key to God's plan of replacement, for as He says to Moses on the occasion of the golden calf rebellion, "I will make you into a great nation" (Ex.32:10). The protection of Israel in Egypt while her numbers grew, her testing under a harsh Pharaoh, her training in the wilderness, and the divinely directed and aided expulsion of the Canaanite tribes were all part and parcel of God's expansion of His family out of one man's seed. With the coming of the nation of Israel, a definite state within definable geographic boundaries under the initial direction of David, a clear type of Christ, the process of filling and replacement continues for the fulfillment of God's promise to Abraham that his descendants would be more numerous than the stars of the heavens, analogous to the filling of the heavens on the fourth Genesis day (Gen.15:5; 22:17; 26:4; Deut.1:10; 1Chron.27:23; Neh.9:23; Heb.11:12; cf. Gen.37:9; Rev.12:1), and a harbinger of the replacement of the fallen angelic "stars" with believing "stars" who choose for God (compare Rev.12:4 with Rev.12:1; being Abraham's spiritual seed, we are all stars in God's firmament: Rom.4:16).</p>



</div>
---
<div class="special-content quote">






<p>As the second pair of Genesis days focused on the completion of an essential environment for physical life through the separation of dry ground from water and of light from the darkness (specifically, of concentrated, sequential light, not the general division of light from darkness accomplished on day one), so the second pair of millennial days (the Jewish age) finds God in His plan for human history sanctifying for Himself first a people, then a nation, to provide first an expanded family of God that would be holy and separate from the rest of the pagan world, then, as a nation, a safe haven for the worldwide testimony of God through the light of Israel.</p>

<p>And as the second pair of Genesis days focuses on the initial filling of the earth with vegetation and of the heavens with the sun, the moon and the stars, so the second pair of millennial days (the Jewish age) finds the first significant expansion of the family of God in human history (through Israel the vine, and the nation Israel, as numerous as the stars), and so, in terms of numbers, the beginning of the process of replacing those angelic creatures who have chosen to disassociate themselves from the family of God.</p>

</div>

### Summary points

We will be arguing that there is progression involved in our seven days from separation towards filling. With respect to days three and four, we can see this progression in the following ways:

- Unlike days one and two (which were separation only), days three and four involve not only separation, but also now filling as well.
- Separation precedes filling on day three, while filling precedes separation on day four, evidencing the progression.

Separation continues to represent God's provisioning of the essential spiritual groundwork (just as with days one and two), while filling represents God's adoption of believers into His eternal family, replacing Satan and the fallen angels.



---




### Summary points

Separation in day three:

- Genesis day of re-creation: Separation of dry land from the waters.
- Millennial day of human history: Separation to God of a holy ***people***.
  - Essential for establishing an environment in which truth and spiritual growth could flourish.

Filling in day three:

- Genesis day of re-creation: Creation of vegetation.
- Millennial day of human history: The calling out of the seed of Abraham.
  - Provides the first substantial and contiguous echelon of believers in the process of replacing the devil and his followers with a people after God's own heart, with the faith of Abraham, the "father of many nations" providing the pattern of salvation for all who would later believe (Rom.4:17; Gal.3:7-9).



---




### Summary points

Separation in day four:

- Genesis day of re-creation: Separation of light from darkness into distinct and regular phases.
- Millennial day of human history: Separation to God of a holy ***nation***.
  - Essential for stabilizing the environment in which truth and spiritual growth could flourish and then be witnessed to the nations.

Filling in day four:

- Genesis day of re-creation: Creation of celestial lights.
- Millennial day of human history: The establishment of Israel, a holy nation.
  - Israel serving as a light to all the nations was an essential step in the expansion of the family of God (Is.42:6; 43:21; 49:6; Acts 13:47).



---




### Summary points

<u>Separation</u>:

The calling out by God of a specific family and its development into a unique, witnessing nation necessitated its separation, its sanctification from all that was profane in the pagan world in which it existed.

- The mark of God's promise to Abraham of a holy progeny, namely circumcision, served to distinguish Israel as unique in God's eyes, and was also, importantly, a symbolic testimony of belief in God and His promises (Rom.2:29).
- The Mosaic Law was also a means of separation, sanctification and demarcation, for it called on Israel to "be holy as I am holy" (Lev.11:44-45; 1Pet.1:16), and an essential underlying principle in all of its precepts was to separate the holy from the profane (Lev.10:10; 20:25-26).

The Ten Commandments, the essence of the Law (cf. Deut.4:13), speak to this same basic idea of separating the people of God from anything evil, sanctifying our conduct in life's most important areas:

### Summary points

As to the expansion of this family/people to encompass a full nation, the firm establishment of the nation Israel with the ascension of David—a clear type of Jesus Christ (Ps.110)---provided the dark world with a shining example of the righteousness and accompanying blessings from God upon a nation that followed Him and His perfect divine standards

<u>Filling</u>:

With God's promise of progeny to Abraham and the birth of Isaac, the process of expansion of the family of God began in earnest, and the line of faith from Adam to Seth, a linear witness with little numerical expansion in the world (as the small remaining remnant of Noah and his seven family members at the time of the flood demonstrates: 1Pet.3:20), now develops into a significant expansion in breadth as Israel the vine begins to flourish under the now more favorable circumstances and to spread out in the world in a manner analogous to the filling of the earth with vegetation on the third Genesis day (Ps.80:8-16; Is.5:1-2; Jer.2:21; Ezek.17; Hos.10:1; cf. Jn.15:1).

With the coming of the nation of Israel, a definite state within definable geographic boundaries under the initial direction of David, a clear type of Christ, the process of filling and replacement continues for the fulfillment of God's promise to Abraham that his descendants would be more numerous than the stars of the heavens, analogous to the filling of the heavens on the fourth Genesis day (Gen.15:5; 22:17; 26:4; Deut.1:10; 1Chron.27:23; Neh.9:23; Heb.11:12; cf. Gen.37:9; Rev.12:1), and a harbinger of the replacement of the fallen angelic "stars" with believing "stars" who choose for God (compare Rev.12:4 with Rev.12:1; being Abraham's spiritual seed, we are all stars in God's firmament: Rom.4:16)

### Summary points

Summary - separation:

- As the second pair of Genesis days focused on the completion of an essential environment for physical life through the separation of dry ground from water and of light from the darkness (specifically, of concentrated, sequential light, not the general division of light from darkness accomplished on day one), so the second pair of millennial days (the Jewish age) finds God in His plan for human history sanctifying for Himself first a people, then a nation, to provide first an expanded family of God that would be holy and separate from the rest of the pagan world, then, as a nation, a safe haven for the worldwide testimony of God through the light of Israel.

- As the second pair of Genesis days focuses on the initial filling of the earth with vegetation and of the heavens with the sun, the moon and the stars, so the second pair of millennial days (the Jewish age) finds the first significant expansion of the family of God in human history (through Israel the vine, and the nation Israel, as numerous as the stars), and so, in terms of numbers, the beginning of the process of replacing those angelic creatures who have chosen to disassociate themselves from the family of God.

### Follow-on topics

When we here speak of God sanctifying to Himself first a *people* and then a *nation*, this in fact describes both the separation and filling. The difference is in what the people and nation represent in either case:

- From the separation angle, these developments represent necessary expansions of God's provision of a framework for spiritual growth in the world.
- From the filling angle, these developments represent the sources of believers being incorporated into God's growing family.

For days one and two, we spoke of how God's truth and freedom are foundational concepts necessary for spiritual growth. Here, the framework for spiritual growth is being further expanded to include first a people set apart, and then a full nation. According to God's perfect superintendence of human history and His dispensation of truth therein, these developments represent additions to His perfect framework to sustain human spiritual growth.

In other words, to best enable human spiritual flourishing, it became necessary for God to set apart for Himself a sanctified people who would act as His light among other peoples. And then, in like manner, this people became a full nation, in order to act as God's light among other nations.



---




### Follow-on topics

Consider how well the symbolism fits together in all this:

- In order for the vegetation of the vine of Israel to flourish, ground had to be separated from water.
 - This was circumcision, the Mosaic Law, and the Ten Commandments.
- What could be more fitting than God filling in Abraham's family with descendant "stars" (according to His promise: Genesis 15:5) than this directly aligning with the creation of celestial lights in the days of Genesis re-creation?

There is a lot to unpack across the cases, but the point for us to consider is that it really does all fit together, even in the details.
