<div class="special-content quote">
<strong>
<a href="/site/content-features/#quotes">Quote</a> from <a href="https://ichthys.com/Satans-Rebellion-Part5.htm">Ichthys</a>
</strong>

<p>The Church is Christ's "body, the fullness of Him who fills everything in every way" (Eph.1:23). The Bible is consistent and insistent upon drawing this analogy between Christ and His Church on the one hand, and man and wife on the other. At the end of a lengthy discussion in Ephesians chapter five of the wife's duties of obedience toward her husband and the husband's duties of love towards his wife, in the final verse (Eph.5:32), Paul admits that this is a great "mystery", but, rather unexpectedly, informs us that he has been speaking all along <strong><em>primarily</em></strong> about Christ and His Church, and only about the relationship between husband and wife by way of analogy.</p>

<p>Thus the intimate relationship between the Savior and His saved is so close, so intense, that in itself it comprises both sides of the mystery we have so far been discussing, namely, the incarnation and sacrifice of Jesus for His Church, and the filling up of that Church in such a marvelous and unanticipated way following His triumph. The analogy (between Christ and Church and man and wife) is, therefore, incredibly close, and can be seen from the very beginning of human history when God invented and sanctified the human institution of marriage.</p>



</div>
---
<div class="special-content quote">






<p>Indeed, it is not too strong a statement to say by way of inference that the whole idea of marriage (something unique to human beings: cf. Lk.20:35-36) was designed by God for mankind in order to teach us about the fundamental and essential tenet of His plan for all of human history: the incarnation and sacrifice of His Son (the loving husband) for the salvation of His Church (the faithful wife). For it is certainly fitting for the most fundamental and original human institution (marriage, consecrated in Eden before the fall: Gen.2:18-24) to mirror and reflect His most fundamental and central purpose for human history as He constructed it (the saving work of Jesus Christ and the calling out of His Church).</p>

<p>Just as God has constructed human existence and human nature so that man needs woman and woman needs man (Gen.2:18), so He has established the span of human history as the type to this antitype, with the coming of Jesus as a true man and the preparation and calling out of His bride the cardinal events of these first six millennial days. Thus the whole purpose and reason for history (salvation for the Church through the Person and work of Christ) is reflected in what is, apart from mortality, arguably the dominant human concern in this life, namely, the marriage relationship. And in every marriage relationship we learn something about the greatest of all mysteries, the great love of Jesus Christ and the faithfulness of His Church.</p>



</div>
---
<div class="special-content quote">






<p>This is true notwithstanding the weakness of our flesh and the resultant imperfect nature of human relationships here in the devil's world. Do men fall short of the perfect standard of Christ's love? Of necessity, they all do (only the degree is in question), but we can learn about the wondrous nature of Christ's perfect love by comparison to the imperfections of every husband we meet: every human lapse reminds us of our divine Husband's perfection. Do women fall short of the perfect obedience and faithfulness that the perfect love of Jesus Christ is due from His Church? Every such instance is a reminder of the perfect responsiveness due to our heavenly Husband. Even the Church itself, that is, the part which remains in these bodies and in this world, is far from perfect in these respects. But it should be noted with care that, in respect to Christ, we as the Church, women <em>and</em> men, find ourselves in the woman's role, and are called upon to manifest the same submissive obedience and faithfulness toward God demonstrated by Christ during His sojourn on the earth, humbling Himself even to the point of total humiliation and death on the cross (Phil.2:5-8).</p>

<p>And so we can learn from observation of any wife something not only about the relationship of the Church to Christ in general, but also (and very importantly) about <em>our</em> individual relationships to Christ. Do we observe a wife who is extraordinary in her duties toward her husband? We examine our own performance toward the One who bought us with His blood and should be challenged to be found likewise in His eyes. Do we observe a wife who in our estimation falls far short of the biblical standard? We would do well to consider our own performance toward Christ and His forgiveness and faithfulness in the face of our rebellious behavior.</p>



</div>
---
<div class="special-content quote">






<p>In short, by applying the analogy of marriage, we learn about who Christ is and what He would have from us, and we learn about our true priorities and His estimation of our behavior. This is indeed a great mystery, revealed now to the Church through Jesus' chosen apostles, the close consideration of which can help us to know our Master better and bring us closer to Him by making us better servants for Him. Just as the first Adam was espoused to Eve by God, flesh of his flesh and bone of his bone, so the Church is the bride of the Last Adam, Jesus Christ (1Cor.15:45; cf. Rom.5:14), the perfect complement to Him, designed for Him, and destined to be one with Him forever (Matt.9:15; Matt.25:1ff.; Mk.2:19; Lk.5:34; Jn.3:29; 2Cor.11:2-3; Eph.1:22-23; 5:22-33; Rev.19:7-14; 21:2-4; 21:9ff.; 22:17; cf. Rom.7:1-6):</p>

<div class="special-content scripture">
<strong>Revelation 19:7-9 | <a href="/site/content-features/#ichthys-translations">Ichthys translation</a></strong>

<p>"Let us rejoice and be jubilant, and let us give glory to [God], because the wedding of the Lamb has come, and His bride has prepared herself. And it has been given her to wear a pure, resplendent [gown] of the finest material (now this fine material represents the righteous acts of His holy ones [believers])." And [the angel] said to me, "Write this down: Happy are those who have been called to the wedding of the Lamb".</p>

</div>


</div>




---




### Summary points

The Bible is consistent and insistent in drawing the analogy between Christ and the Church and man and wife. In a surprising reversal of sorts, after a long discourse on the nature of the relationship between man and wife (Ephesians 5:21-31), Paul tells us that he was actually speaking all along not only about the human relationship, but also about Christ and the Church (Ephesians 5:32).

The intimate marriage relationship between Christ and the Church itself comprises both sides of the mystery we discussed in the last lesson:

1. The incarnation and sacrifice of Jesus for His Church.
2. The filling up of that Church in such a marvelous and unanticipated way following His triumph.

In all of this we should note that God made human marriage to point to this relationship, not the other way around. In fact, we can go a step further and say that this is not some small, minor part of the reason why God created marriage for mankind, but is instead *the* primary reason for marriage to begin with. It is certainly fitting for the most fundamental and original human institution (marriage, consecrated in Eden even before the fall: Gen.2:18-24) to mirror and reflect His most fundamental and central purpose for human history as He constructed it (the saving work of Jesus Christ, and the calling out of His Church).



---




### Summary points

In every marriage relationship we learn something about the greatest of all mysteries: the incarnation and sacrifice of His Son (the loving husband) for the salvation of His Church (the faithful wife). This is true notwithstanding the weakness of our flesh and the resultant imperfect nature of human relationships here in the devil's world:

- We can learn about the wondrous nature of Christ's perfect love by comparison to the imperfections of every human husband we meet: every human lapse reminds us of our divine Husband's perfection.
- We can learn about the perfect obedience and faithfulness owed Jesus Christ by comparison to the imperfections of every human wife we meet: every human lapse reminds us of the absolute responsiveness due our Savior, who laid down His life for us in love.

We should emphasize that *all* of us human beings (men and women alike) currently find ourselves in the woman's role, and are called upon to manifest the same submissive obedience and faithfulness toward God demonstrated by Christ during His sojourn on the earth, humbling Himself even to the point of total humiliation and death on the cross (Phil.2:5-8). And so we can learn from observation of any wife something not only about the relationship of the Church to Christ in general, but also (and very importantly) about *our* individual relationships to Christ.



---




### Summary points

In short, by applying the analogy of marriage, we learn about who Christ is and what He would have from us, and we learn about our true priorities and His estimation of our behavior. This is indeed a great mystery, revealed now to the Church through Jesus' chosen apostles, the close consideration of which can help us to know our Master better and bring us closer to Him by making us better servants for Him. Just as the first Adam was espoused to Eve by God, flesh of his flesh and bone of his bone, so the Church is the bride of the Last Adam, Jesus Christ, the perfect complement to Him, designed for Him, and destined to be one with Him forever.

### Follow-on topics

#### If human marriage symbolically represents the relationship between Christ and the Church, why won't it be a thing in eternity?



Luke 20:35-36 tells us quite clearly that there will not be human marriage in eternity.

This leads us to a question: given that at this point the Church will be united with Christ (i.e., this is after "the wedding supper of the Lamb" mentioned in Revelation 19:7-9), well won't the symbolism still be in effect (in the sense that Christ and the Church will still be perfectly united)? So why does the human institution go away?

Most anything we say here is mere speculation, because the Bible simply doesn't say directly. 

One might examine the matter from a purely practical approach. Say a man married a woman, but then she died during childbirth (like has been very common throughout much of history). This then happened two more times. Which of three women would he be married to in eternity? This example alone should make it obvious that there is no particularly good way to map temporal human relationships onto eternal relationships. And this is not even mentioning all the messiness that divorce and remarriage necessarily introduces.



---




#### If human marriage symbolically represents the relationship between Christ and the Church, why won't it be a thing in eternity?

The above aside, I think how we understand all this can perhaps be simpler than squinting at all that. The sort of unity we will have with one another in eternity will put even the very closest of temporal human relationships to shame. We will all have infinite time to grow close to every other believer that has ever lived, in perfect love. In a world without the constraints we now operate under---a world without any concept of opportunity cost---why limit ourselves in the relationships we have with others? We will have enough time, emotional bandwidth, etc. to have relationships with everyone. It's *eternity*. Expand your field of view a little!

You might ask about sex then. Well, procreation will no longer be necessary in eternity, so that's one thing. In time, sex is clearly restricted to the bounds of marriage. So if there's no marriage in eternity, does that mean no sex?



---




#### If human marriage symbolically represents the relationship between Christ and the Church, why won't it be a thing in eternity?

Something C.S. Lewis wrote on the matter:

<div class="special-content quote">
<strong>
<a href="/site/content-features/#quotes">Quote</a> from <a href="https://en.wikipedia.org/wiki/Miracles_(book)">C.S. Lewis, *Miracles*, “Miracles of the New Creation”</a>
</strong>

<p>“The letter and spirit of scripture, and of all Christianity, forbid us to suppose that life in the New Creation will be a sexual life; and this reduces our imagination to the withering alternative either of bodies which are hardly recognizable as human bodies at all or else of a perpetual fast. As regards the fast, I think our present outlook might be like that of a small boy who, on being told that the sexual act was the highest bodily pleasure should immediately ask whether you ate chocolates at the same time. On receiving the answer ‘No,’ he might regard absence of chocolates as the chief characteristic of sexuality. In vain would you tell him that the reason why lovers in their carnal raptures don’t bother about chocolates is that they have something better to think of. The boy knows chocolate: he does not know the positive thing that excludes it. We are in the same position. We know the sexual life; we do not know, except in glimpses, the other thing which, in Heaven, will leave no room for it.</p>

<p>Hence where fullness awaits us we anticipate fasting. In denying that sexual life, as we now understand it, makes any part of the final beatitude, it is not of course necessary to suppose that the distinction of sexes will disappear. What is no longer needed for biological purposes may be expected to survive for splendor. Sexuality is the instrument both of virginity and of conjugal virtue; neither men nor women will be asked to throw away weapons they have used victoriously. It is the beaten and the fugitives who throw away their swords. The conquerors sheathe theirs and retain them.”</p>

</div>




---




#### If human marriage symbolically represents the relationship between Christ and the Church, why won't it be a thing in eternity?

Unlike Lewis, I don't take a firm stand one way or the other regarding whether or not there will be any concept of sex in eternity (Lewis here actually stakes his flag down, answering the question in the negative). Humans were allowed to eat meat when they previously were not (cf. Genesis 9:2-4), so why not this too, once circumstances change (like they clearly will in eternity)? On what interpretative basis would we say it is completely impossible (as opposed to, say, seeming rather unlikely, given that there will not be marriage in eternity, and sex has up until now been only within marriage)? Again, we simply do not know about such things, because the Bible does not say.

Nonetheless, Lewis's argument is the correct one to make if someone does come to us worried about some form of hypothetical deprivation in eternity: like the little boy who cannot understand why lovers care not about chocolates within the throes of passion, even if we were to lose what we now consider the highest form of pleasure, it will no doubt be because we are too busy doing something else so much better that it makes sex seem boring and plain by comparison. This renders the deprivation argument completely toothless in practice, if one even wants to bother addressing it one way or the other.



---




#### If human marriage symbolically represents the relationship between Christ and the Church, why won't it be a thing in eternity?

So no matter what, we know we will not find ourselves missing marriage in eternity. In time, things like sex, companionship, and family come along with marriage. In eternity, no matter how exactly everything works, we can be sure that what comes to take the place of these godly things will only be better in every way.

And that, I think is the real answer here. Human marriage is a symbolic shadow; once we are in eternity and have the real thing (as in, completely perfect intimacy with one another and with Christ), there is no more need for the symbol. It's just like the shadows of the Law passing away after Jesus's first advent, except here the timing is just a bit different, is all.

After the full revelation of the mystery of Christ and the Church (which we will talk about next lesson), not shockingly, some changes will come about:

<div class="special-content scripture">
<strong>1 Corinthians 13:12 | NIV11</strong>

<p>For now we see only a reflection as in a mirror; then we shall see face to face. Now I know in part; then I shall know fully, even as I am fully known.</p>

</div>


And this "no marriage in eternity" business is simply part of that wider principle.

### Biblical submission is manly



In this week's content, we made the point that *all* of us human beings (men and women alike) currently find ourselves in the woman's role, and are called upon to manifest the same submissive obedience and faithfulness toward God demonstrated by Christ during His sojourn on the earth.

Submitting is therefore not something that is uniquely the province of women, as if it were somehow unmanly. I'll gladly accept jeers about my supposed lack of manly pride if it means I am more like Christ. During the incarnation, Jesus lived a life of *utter* submission to the Father. So are we going to say that the Son of Man was not truly manly? Come now.

Men better get it through their heads that they are just like women in this regard. They too *must* bend the knee to all forms of authority above them: established human authority (like governments), pastor-teachers in the Church, and, of course, Jesus Christ himself. (Compare [Peter #34](https://ichthys.com/Pet34.htm#:~:text=Submit%20yourselves%20to%20every%20established%20human%20authority%20for%20the%20Lord%27s%20sake%20%28v.13%29) and [Peter #35](https://ichthys.com/Pet35.htm#:~:text=We%20are%20all%20under,Church%20of%20Jesus%20Christ.) on [Ichthys](https://ichthys.com/)).

Submission is therefore not a particularly gendered thing in general; only within the confines of human marriage is the submission of a wife to her husband a gendered thing. In all other areas, men and women are completely the same when it comes to submitting to authority.

### The metaphor of marriage between Christ and the Church is important for fully understanding various things in the Bible



We introduced the Church as the bride of Christ in this lesson. Once you understand the general idea, it informs interpretation in certain other areas.

For example, consider that Song of Solomon is clearly not only a love poem between two human lovers, but also between Christ and the Church. Failing to appreciate that robs that entire book of much of its spiritual significance.

### The metaphor of marriage between Christ and the Church is important for fully understanding various things in the Bible

God speaks of giving unfaithful Israel a divorce due to adultery (verse 8). He says that He is married to Israel (verse 14). Verses 1 and 20 directly use terminology of husband and wife. All this tells us that the relationship we have spoken of in this lesson is far from an offhand comparison used in a single spot, but actually permeates all of scripture.
