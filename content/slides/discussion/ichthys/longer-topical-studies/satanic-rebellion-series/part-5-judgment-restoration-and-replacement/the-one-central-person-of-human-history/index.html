<div class="special-content quote">
<strong>

</strong>

<div class="special-content scripture">
<strong>Ephesians 3:11 | <a href="/site/content-features/#ichthys-translations">Ichthys translation</a></strong>
<p>. . . according to His plan for the ages (i.e., history) which He has implemented in [the person of] Christ Jesus our Lord . . .</p>
</div>


<p>Jesus Christ is the linchpin of human history. He is the mystery shrouded before the cross, revealed after the cross (Eph.1:9-10; 3:9-10; Col.1:26-27). He is <em>the</em> Son of God (undiminished, genuine deity: Matt.16:16; Jn.1:18), and <em>the</em> Son of Man (perfect, genuine humanity: Mk.8:31). He is uniquely Man and God, and so alone is qualified to sacrifice Himself to God on Man's behalf at the cross, the turning point of all human history. Like the highest mountain peak, or a giant vortex into which everything is eventually drawn, Jesus Christ, in the most complete sense of God's point of view, <strong><em>is</em></strong> history, because human history has no purpose without His saving work on the cross (which is the entire point of history).</p>



</div>
---
<div class="special-content quote">






<p>From the first, prehistoric Eden (see <a href="https://ichthys.com/SR1copy.htm">Part 1 of this series</a>), to the garden of Eden, to the dark world in which we now find ourselves (wherein He is the only light: Jn.1:4-5; 1:9; 3:19; 8:12; 1Jn.2:8), to the coming Kingdom of God, Jesus Christ is and has always been the visible Person of God, the face of God (2Cor.4:6; Heb.1:3), and the ultimate issue for every human being who has ever lived. No one, therefore, can approach God the Father apart from embracing the Son and His saving work:</p>

<div class="special-content scripture">
<strong>John 6:22-23 | NIV</strong>
<p>Moreover, the Father judges no one, but has entrusted all judgment to the Son, that all may honor the Son just as they honor the Father. He who does not honor the Son does not honor the Father, who sent Him.</p>
</div>


<div class="special-content scripture">
<strong>John 12:44 | <a href="/site/content-features/#ichthys-translations">Ichthys translation</a></strong>
<p>He who believes in Me does not believe in Me, but in He who sent Me.</p>
</div>


<div class="special-content scripture">
<strong>John 14:6 | <a href="/site/content-features/#ichthys-translations">Ichthys translation</a></strong>
<p>I am the way: the truth and the life. No one can come to the Father except through me.</p>
</div>


<p>In response to the Father's will, Jesus Christ is the Creator of the universe, of men and angels alike, and all things owe their continued existence to Him. Therefore even the stage upon which human history is played out is His work, for the world was created by Him and for Him.</p>

<div class="special-content scripture">
<strong>Colossians 1:16-17 | <a href="/site/content-features/#ichthys-translations">Ichthys translation</a></strong>
<p>Everything in the heavens and on the earth was created by Him (Jesus Christ), things invisible as well as those visible – whether thrones, authorities, rulers or powers, everything was created through Him and for Him. And He Himself is before everything, and everything subsists in Him.</p>
</div>


</div>

### Discussion

### Summary points and follow-on topics

Summary points:

- Reading and discussing some of those verse references:
  - Jesus is the mystery shrouded before the cross, revealed after the cross (Eph.1:9-10; 3:9-10; Col.1:26-27)
  - Jesus is *the* Son of God (undiminished, genuine deity: Matt.16:16; Jn.1:18)
  - Jesus is *the* Son of Man (perfect, genuine humanity: Mk.8:31)
  - Jesus is the only light in this dark world: Jn.1:4-5; 1:9; 3:19; 8:12; 1Jn.2:8
  - Jesus is and has always been the visible Person of God, the face of God (2Cor.4:6; Heb.1:3)



---




### Summary points and follow-on topics

Follow-on topics:

- When we call Jesus the prince of the universe, He really is. Everything was created by Him and for Him, and He is the person around whom all of history revolves. It is *His* story, truly.
- Since the Son is the member of the Trinity who is visible to us, we describe God's actions throughout history mostly in terms of what He has done (with the Father having sent Him, and the unseen Spirit empowering Him, in perfect unity).
