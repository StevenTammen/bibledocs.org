{{ partial "header.html" . }}

<div class="header">
  <h1>{{ .Title }}</h1>
</div>
<div class="content">

	{{ if .Truncated }}
	    {{ $summaryLen := sub (len .Summary) 1 }}
	    {{ substr .Content $summaryLen | safeHTML }}
	{{ else }}
	    {{ .Content }}
	{{ end }}
  
</div>

<!-- Site Functions -->
